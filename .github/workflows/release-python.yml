name: Release Python

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA
        type: string
      dry-run:
        description: Dry run
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.11'
  RUST_VERSION: '1.91.1'

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: aarch64
          - runner: ubuntu-latest
            target: armv7
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: py-hftbacktest -> target
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          rust-toolchain: ${{ env.RUST_VERSION }}
          args: --manifest-path=py-hftbacktest/Cargo.toml --release --out dist --find-interpreter
          manylinux: 2_28
          before-script-linux: |
            case "${{ matrix.platform.target }}" in
              "armv7")
                sudo apt-get update
                sudo apt-get install -y gcc-multilib
                ;;
            esac
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: aarch64
          - runner: ubuntu-latest
            target: armv7
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: py-hftbacktest -> target
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          rust-toolchain: ${{ env.RUST_VERSION }}
          args: --manifest-path=py-hftbacktest/Cargo.toml --release --out dist --find-interpreter
          manylinux: musllinux_1_2
          before-script-linux: |
            case "${{ matrix.platform.target }}" in
              "armv7")
                sudo apt-get update
                sudo apt-get install -y gcc-multilib
                ;;
            esac
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: ${{ matrix.platform.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: py-hftbacktest -> target
#      - name: Install dependencies
#        run: |
#          choco install openssl
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          rust-toolchain: ${{ env.RUST_VERSION }}
          args: --manifest-path=py-hftbacktest/Cargo.toml --release --out dist --find-interpreter
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-14
            target: aarch64
          - runner: macos-15-intel
            target: x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: py-hftbacktest -> target
      - name: Install dependencies
        run: |
          brew install openssl
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          rust-toolchain: ${{ env.RUST_VERSION }}
          args: --manifest-path=py-hftbacktest/Cargo.toml --release --out dist --find-interpreter
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: inputs.dry-run == false
    needs: [linux, musllinux, windows, macos]
    environment: release-python
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing wheels-*/*
